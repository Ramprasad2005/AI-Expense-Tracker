<div class="login-container fade-in-up">
  <div class="card login-card border-0">
    <div class="card-body p-0">
      
      <!-- Brand & Title -->
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-3 p-3 mb-3">
          <i class="fa-solid fa-wallet fs-2 text-primary"></i>
        </div>
        <h3 class="fw-bold mb-1">Welcome Back</h3>
        <p class="text-muted small">Enter your credentials to access your financial dashboard.</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label-premium">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-control-premium" 
            formControlName="email" 
            placeholder="name@example.com"
            [class.is-invalid]="submitted && f['email'].errors"
          >
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback-premium">
            <span *ngIf="f['email'].errors['required']">Email address is required</span>
            <span *ngIf="f['email'].errors['email']">Please enter a valid email address</span>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label-premium">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-control-premium" 
            formControlName="password" 
            placeholder="••••••••"
            [class.is-invalid]="submitted && f['password'].errors"
          >
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback-premium">
            <span *ngIf="f['password'].errors['required']">Password is required</span>
            <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-muted small" for="rememberMe">
              Remember me
            </label>
          </div>
          <a routerLink="/forgot-password" class="text-primary text-decoration-none small fw-semibold">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-premium-primary w-100 py-3 d-flex justify-content-center align-items-center" [disabled]="loading">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="loading" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Signing In...' : 'Sign In' }}</span>
        </button>
      </form>

      <!-- Navigation Link -->
      <div class="text-center mt-4">
        <p class="mb-0 text-muted small">Don't have an account? <a routerLink="/register" class="text-primary text-decoration-none fw-semibold">Register here</a></p>
      </div>

    </div>
  </div>
</div>
