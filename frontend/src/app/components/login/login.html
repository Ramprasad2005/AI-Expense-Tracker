<div class="login-container fade-in-up">
  <div class="glass-card p-4 p-md-5 login-card">
    <div class="card-body p-0">

      <!-- Brand & Title -->
      <div class="text-center mb-4">
        <div class="brand-badge-gold mx-auto mb-3" style="width: 52px; height: 52px;">
          <i class="fa-solid fa-vault fs-4 text-dark"></i>
        </div>
        <h2 class="font-heading h3 text-gold mb-1">Institutional Access</h2>
        <p class="text-secondary-custom small mb-0 font-body">Authenticate to enter your real-time executive ledger.</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label-premium">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-control-luxury" 
            formControlName="email" 
            placeholder="name@example.com"
            [class.is-invalid]="submitted && f['email'].errors"
          >
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback-premium">
            <span *ngIf="f['email'].errors['required']">Email address is required</span>
            <span *ngIf="f['email'].errors['email']">Please enter a valid email address</span>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label-premium">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-control-luxury" 
            formControlName="password" 
            placeholder="••••••••"
            [class.is-invalid]="submitted && f['password'].errors"
          >
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback-premium">
            <span *ngIf="f['password'].errors['required']">Password is required</span>
            <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input border-gold bg-dark" type="checkbox" id="rememberMe">
            <label class="form-check-label text-secondary-custom small font-body" for="rememberMe">
              Remember active session
            </label>
          </div>
          <a routerLink="/forgot-password" class="text-gold font-bold text-decoration-none small">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-gold-primary w-100 py-3 d-flex justify-content-center align-items-center" [disabled]="loading">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="loading" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Authenticating...' : 'Sign In to Dashboard' }}</span>
        </button>
      </form>

      <!-- Navigation Link -->
      <div class="text-center mt-4">
        <p class="mb-0 text-secondary-custom small font-body">Don't have an account? <a routerLink="/register" class="text-gold font-bold text-decoration-none ms-1">Register Here</a></p>
      </div>

    </div>
  </div>
</div>
