<div class="d-flex flex-column min-vh-100 bg-light">
  
  <!-- Navbar -->
  <app-navbar *ngIf="showGlobalNavbar"></app-navbar>

  <!-- Routed Component Content Area -->
  <main class="flex-grow-1">
    <router-outlet></router-outlet>
  </main>

  <!-- Global Toast Alert Center -->
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1200;">
    <div 
      *ngFor="let toast of notificationService.toasts$ | async" 
      class="toast show align-items-center text-white border-0 mb-2 shadow"
      [class.bg-success]="toast.type === 'success'"
      [class.bg-danger]="toast.type === 'danger'"
      [class.bg-warning]="toast.type === 'warning'"
      [class.bg-info]="toast.type === 'info'"
      role="alert" 
      aria-live="assertive" 
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body">
          <i class="fa-solid me-2"
             [class.fa-circle-check]="toast.type === 'success'"
             [class.fa-circle-exclamation]="toast.type === 'danger'"
             [class.fa-triangle-exclamation]="toast.type === 'warning'"
             [class.fa-circle-info]="toast.type === 'info'">
          </i>
          {{ toast.message }}
        </div>
        <button 
          type="button" 
          class="btn-close btn-close-white me-2 m-auto" 
          (click)="notificationService.removeToast(toast)" 
          aria-label="Close"
        ></button>
      </div>
    </div>
  </div>

</div>
